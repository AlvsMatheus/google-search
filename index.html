<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="transparent">
    <title>Google Search</title>
    <link rel="stylesheet" href="style/reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
</head>
<body>
    <header class="d-flex flex-row flex-nowrap justify-content-end">
    <nav class="d-flex align-items-center">
        <a href="#">Images</a>
        <a href="#">Advanced search</a>
    </nav>
    </header>
    <main>
        <div class="container d-flex justify-content-center align-items-center ">
            <section class="google d-flex flex-column justify-content-start align-items-center gap-4">
                <h1>
                    Google
                </h1>
                <form action="https://www.google.com/search" class="d-flex flex-column gap-4">
                    <div class="search d-flex flex-row justify-content-evenly align-items-center pt-2 px-2">
                        <div class="d-flex d-flex justify-content-around p-1 gap-4">
                            <label for="itext"><i class="material-icons-outlined">search</i></label>
                            <input type="text" name="q" id="itext">
                        </div>
                        <div class="d-flex flex-row justify-content-start gap-3">
                            <span>
                                <i class="material-icons-outlined">keyboard</i>
                            </span>
                            <span>
                                <i class="material-icons-outlined">microfone</i>
                            </span>
                            <span>
                                <i class="material-icons-outlined">camera</i>
                            </span>
                        </div>
                    </div>
                    <div class="d-flex flex-row justify-content-center gap-2">
                        <input type="submit" name="q" value="Google search" class="below-search">
                        <input type="submit" value="I'm luckying" class="below-search">
                    </div>
                </form>
            </section>
        </div>
    </main>
    <footer class="d-flex flex-column justify-content-center ">
        <div class="d-flex justify-content-start ps-4 pt-2 align-items-center ps-md-4 pt-md-1 ">
            <p>United States</p>
        </div>
        <div class="below-links d-flex flex-column flex-md-row justify-content-center gap-2 justify-content-md-evenly pt-3 ">
            <div class="d-flex flex-row flex-nowrap justify-content-center gap-4 gap-md-3 py-2 p-md-0 justify-content-md-row- align-items-md-center">
                <a href="#">
                    About
                </a>
                <a href="#">
                    Publicy
                </a>
                <a href="#">
                    Business
                </a>
                <a href="#">
                    how works our search
                </a>
            </div>
            <div class="d-flex flex-row justify-content-center gap-4 align-items-md-center gap-md-3">
                <a href="#">
                    Privacy
                </a>
                <a href="#">
                    Terms
                </a>
                <a href="#">
                    settings
                </a>
            </div>
        </div>

    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
